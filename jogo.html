<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/jogo.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>Turfe</title>
</head>

<body>
    <div class="container-header">
        <img src="./imgs/icon.png" class="icon" alt="?" onclick="abrirAjuda()">
    </div>

    <div class="container-cards">
        <div class="card1">
            <small>CAVALO 1 ESTÁ <br> <br> GANHANDO</small>
            <img src="./imgs/card2.png" id="card1-img">
        </div>

        <div class="card2">
            <img src="./imgs/card2.png" id="card2-img">
            <img src="./imgs/loading.gif" id="loading">
        </div>

        <div id="ajuda" class="popup">
            <div class="popup-conteudo">
                <h2>Como Jogar</h2>
                <p>Clique em START para iniciar a corrida.</p>
                <p>Escolha seu cavalo e acompanhe a disputa.</p>
                <p>O objetivo é chegar em primeiro lugar!</p>
                <button onclick="fecharAjuda()">FECHAR</button>
            </div>
        </div>
    </div>

</body>

</html>

<script>
    function abrirAjuda() {
        document.getElementById("ajuda").style.display = "flex";
    }

    function fecharAjuda() {
        document.getElementById("ajuda").style.display = "none";
    }
</script>
