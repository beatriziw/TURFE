<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="css/cavalo.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <script src="/socket.io/socket.io.js"></script>

    <title>Turfe</title>
  </head>
  <body>
    <div class="container">
      <div class="ladoesquerdo">
        <div class="personagem">
          <img src="imgs/personagem.png" />
        </div>
        <div class="fala">
          <img src="imgs/balão.webp" />
          <p>DÊ UM NOME PARA SEU CAVALO</p>
        </div>

        <div class="input">
          <img src="imgs/card.webp" />
          <input
            type="text"
            id="input_nome"
          />
        </div>

        <a
          href="jogo.html"
          class="continue"
          onclick="enviar()"
        >
          <img src="imgs/card_redondo.png" />
          <span>CONTINUE</span>
        </a>
      </div>

      <div class="ladodireito">
        <div
          class="setaesquerda"
          id="anterior"
        >
          <img
            src="imgs/setaesquerda.png"
            onclick="anterior()"
          />
        </div>

        <div class="card">
          <img src="imgs/card3.png" />
          <p>ESCOLHA SEU<br />CAVALO:</p>
          <div class="cavalo">
            <img
              src="imgs/cavalo1.png"
              id="cavalo"
            />
          </div>
        </div>

        <div
          class="setadireita"
          id="proximo"
        >
          <img
            src="imgs/setadireita.png"
            onclick="proximo()"
          />
        </div>
      </div>
    </div>
  </body>
</html>
<script>
  let opcoes = [
    'imgs/cavalo1.png',
    'imgs/cavalo2.png',
    'imgs/cavalo3.png',
    'imgs/cavalo4.png',
    'imgs/cavalo5.png',
    'imgs/cavalo6.png',
    'imgs/cavalo7.png',
    'imgs/cavalo8.png'
  ];

  let imagem = document.getElementById('cavalo');

  let indice = 0;

  function anterior() {
    indice--;

    if (indice < 0) {
      indice = opcoes.length - 1;
    }
    imagem.src = opcoes[indice];
  }
  function proximo() {
    indice++;

    if (indice >= opcoes.length) {
      indice = 0;
    }
    imagem.src = opcoes[indice];
  }

  const socket = io();

  function enviar() {
    let name = input_nome.value;

    socket.emit('register', { name, style: opcoes[indice] });
  }
</script>
