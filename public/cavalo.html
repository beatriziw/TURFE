<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="css/cavalo.css"
    />
    <link
      rel="stylesheet"
      href="css/jogo.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <script src="/socket.io/socket.io.js"></script>

    <title>Turfe</title>
  </head>
  <body>
    <section
      id="horse_section"
      class="container"
    >
      <div class="ladoesquerdo">
        <div class="personagem">
          <img src="imgs/personagem.png" />
        </div>
        <div class="fala">
          <img src="imgs/balão.webp" />
          <p>DÊ UM NOME PARA SEU CAVALO</p>
        </div>

        <div class="input">
          <img src="imgs/card.webp" />
          <input
            type="text"
            id="input_nome"
          />
        </div>

        <div
          class="continue"
          onclick="enviar()"
        >
          <img src="imgs/card_redondo.png" />
          <span>CONTINUE</span>
        </div>
      </div>

      <div class="ladodireito">
        <div
          class="setaesquerda"
          id="anterior"
        >
          <img
            src="imgs/setaesquerda.png"
            onclick="anterior()"
          />
        </div>

        <div class="card">
          <img src="imgs/card3.png" />
          <p>ESCOLHA SEU<br />CAVALO:</p>
          <div class="cavalo">
            <img
              src="imgs/cavalo1.png"
              id="cavalo"
            />
          </div>
        </div>

        <div
          class="setadireita"
          id="proximo"
        >
          <img
            src="imgs/setadireita.png"
            onclick="proximo()"
          />
        </div>
      </div>
    </section>

    <section
      id="game_section"
      style="display: none"
    >
      <div class="container-header">
        <img
          src="./imgs/icon.png"
          class="icon"
          alt="?"
          onclick="abrirAjuda()"
        />
      </div>

      <div class="container-cards">
        <div class="card1">
          <small
            ><span id="span_winning"></span> ESTÁ <br />
            <br />
            GANHANDO</small
          >
          <img
            src="./imgs/card2.png"
            id="card1-img"
          />
        </div>

        <div class="card2">
          <img
            src="./imgs/card2.png"
            id="card2-img"
          />
          <div id="players_leaderboard"></div>
          <div id="play_container">
            <button onclick="play()">Dar volta</button>
          </div>
          <div
            id="skill_container"
            style="display: none"
          >
            <button onclick="abrirSkill()">Usar habilidade</button>
          </div>
        </div>

        <div
          id="skill"
          class="popup"
        >
          <div class="popup-conteudo">
            <h2>Escolha alguém para atrapalhar!</h2>

            <div id="players_list"></div>

            <button onclick="fecharSkill()">FECHAR</button>
          </div>
        </div>

        <div
          id="ajuda"
          class="popup"
        >
          <div class="popup-conteudo">
            <h2>Como Jogar</h2>
            <p>Clique em START para iniciar a corrida.</p>
            <p>Escolha seu cavalo e acompanhe a disputa.</p>
            <p>O objetivo é chegar em primeiro lugar!</p>
            <button onclick="fecharAjuda()">FECHAR</button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
<script>
  let opcoes = [
    'imgs/cavalo1.png',
    'imgs/cavalo2.png',
    'imgs/cavalo3.png',
    'imgs/cavalo4.png',
    'imgs/cavalo5.png',
    'imgs/cavalo6.png',
    'imgs/cavalo7.png',
    'imgs/cavalo8.png'
  ];

  let imagem = document.getElementById('cavalo');

  let indice = 0;

  function anterior() {
    indice--;

    if (indice < 0) {
      indice = opcoes.length - 1;
    }
    imagem.src = opcoes[indice];
  }
  function proximo() {
    indice++;

    if (indice >= opcoes.length) {
      indice = 0;
    }
    imagem.src = opcoes[indice];
  }

  const socket = io();

  function enviar() {
    let name = input_nome.value;

    socket.emit('register', { name, style: opcoes[indice] });
    horse_section.style.display = 'none';
    game_section.style.display = 'flex';
  }

  // game

  function abrirAjuda() {
    document.getElementById('ajuda').style.display = 'flex';
  }

  function fecharAjuda() {
    document.getElementById('ajuda').style.display = 'none';
  }

  function play() {
    socket.emit('play');
  }

  let players = [];

  function abrirSkill() {
    document.getElementById('skill').style.display = 'flex';

    let content = '';

    for (let i = 0; i < players.length; i++) {
      let player = players[i];

      content += `
        <div onclick="skill('${player.id}')" style="cursor: pointer;"> 
          <img
            src=${player.style}
            class="player"
          />
          <div class="card-player">
            <p>${player.name}</p>
            <p>Tempo atual: ${player.totalTime}</p>
          </div>
        </div>
      `;
    }

    players_list.innerHTML = content;
  }

  function fecharSkill() {
    document.getElementById('skill').style.display = 'none';
  }

  function skill(id) {
    console.log('skill used', id);
    socket.emit('skill_used', id);
  }

  socket.on('skill_available', ({ playerId, horses }) => {
    if (socket.id == playerId) {
      skill_container.style.display = 'flex';
      players = horses.filter((h) => h.id !== playerId);
    }
  });

  socket.on('skill_log', ({ player, target, prevTotalTime, updattedTotalTime }) => {
    alert(`
      ${player.name} jogou um tomate em ${target.name}. \n
      Seu tempo total foi de ${prevTotalTime} para ${updattedTotalTime}
    `);

    if (player.id == socket.id) {
      skill_container.style.display = 'none';
    }
  });

  socket.on('next', ({ currentLap, horses }) => {
    let sorted = horses.sort((a, b) => a.totalTime - b.totalTime);
    let content = '';

    for (let i = 0; i < sorted.length; i++) {
      let player = sorted[i];

      content += `
        <div> 
          <img
            src=${player.style}
            class="player"
          />
          <div class="card-player">
            <p>${player.name}</p>
            <p>Tempo atual: ${player.totalTime}</p>
          </div>
        </div>
      `;
    }

    players_leaderboard.innerHTML = content;
    span_winning.innerHTML = sorted[0].name;
  });

  socket.on('finish', ({ currentLap, horses }) => {
    sessionStorage.currentLap = currentLap;
    sessionStorage.horses = JSON.stringify(horses);
    window.location.href = '/podio.html';
  });
</script>
